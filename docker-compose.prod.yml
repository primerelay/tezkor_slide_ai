version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tezkor-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-tezkor}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-tezkor123}
      POSTGRES_DB: ${DATABASE_NAME:-tezkor_slide_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-tezkor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tezkor-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
